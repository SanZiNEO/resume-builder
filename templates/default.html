<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title}</title>
<style>
  @page { size: A4; margin: 20mm 18mm; }
  * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; }

  :root { --primary: #2563EB; --primary-light: #eef2ff; --primary-mid: #bfdbfe; --card: #fafbfd; --text: #1e293b; --text-light: #64748b; }

  body { font-family: "Inter","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif; background: #e8e8e8; font-size: 13px; line-height: 1.55; padding: 20px 0; color: var(--text); }

  .page { width: 210mm; min-height: 297mm; background: #fff; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 20mm 18mm; }

  .header { margin-bottom: 22px; padding-left: 14px; border-left: 4px solid var(--primary); }
  .header h1 { font-size: 28px; font-weight: 700; color: #0f172a; letter-spacing: 1px; }
  .header .info-line { font-size: 12.5px; color: var(--text-light); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px 16px; }
  .header .target { font-size: 13px; color: var(--primary); font-weight: 500; margin-top: 6px; }

  .section { margin-bottom: 16px; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--primary-mid), transparent); }

  .entry { background: var(--card); border-radius: 6px; padding: 10px 14px; margin-bottom: 7px; border-left: 3px solid var(--primary-mid); }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .entry-title { font-size: 13px; font-weight: 600; color: #0f172a; }
  .entry-meta { font-size: 11px; color: var(--primary); font-weight: 500; flex-shrink: 0; padding-left: 8px; background: var(--primary-light); padding: 1px 8px; border-radius: 3px; white-space: nowrap; }
  .entry-sub { font-size: 12px; color: var(--text-light); margin-bottom: 3px; display: flex; flex-wrap: wrap; gap: 4px 8px; }
  .entry-sub .tag { font-size: 11px; color: var(--primary); }
  .entry-sub .tag::before { content: '·'; margin-right: 4px; }
  .entry-sub .tag:first-child::before { content: none; }
  .entry-body { margin-top: 2px; }
  .entry-body ul { list-style: none; padding-left: 0; }
  .entry-body li { position: relative; padding-left: 14px; margin-bottom: 2px; color: var(--text-light); font-size: 12px; }
  .entry-body li::before { content: ''; position: absolute; left: 0; top: 7px; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); opacity: 0.45; }
  .entry-body li strong { color: var(--text); font-weight: 600; }

  .two-col { display: flex; gap: 14px; margin-bottom: 16px; }
  .two-col > div { flex: 1; }

  .skills-wrap { background: var(--card); border-radius: 6px; padding: 10px 14px; border-left: 3px solid var(--primary-mid); display: flex; flex-wrap: wrap; gap: 3px 0; }
  .skills-wrap .item { font-size: 12.5px; color: var(--text-light); margin-right: 18px; }
  .skills-wrap .item strong { color: var(--text); }

  .footer-deco { margin-top: 24px; text-align: center; font-size: 8px; color: var(--primary-mid); letter-spacing: 4px; }

  @media print { body { background: #fff; padding: 0; } .page { box-shadow: none; margin: 0; padding: 0; width: auto; min-height: auto; } }
</style>
</head>
<body>
<div class="page">

{header}

{sections}

{footer}

</div>
</body>
</html>
