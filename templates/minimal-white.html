<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title}</title>
<style>
  @page { size: A4; margin: 22mm 18mm; }
  * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; }
  :root { --text: #222; --text-light: #888; --line: #e8e8e8; }
  body { font-family: "PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif; background: #e8e8e8; font-size: 13px; line-height: 1.6; padding: 20px 0; color: var(--text); }
  .page { width: 210mm; min-height: 297mm; background: #fff; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 22mm 18mm; }
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 26px; font-weight: 700; color: #000; letter-spacing: 1px; }
  .header .info-line { font-size: 12.5px; color: var(--text-light); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px 18px; }
  .header .target { font-size: 13px; color: var(--text); font-weight: 500; margin-top: 4px; }

  .header-with-avatar { display: flex; align-items: center; gap: 20px; }
  .header-with-avatar .header-text { flex: 1; }
  .header-with-avatar .header-avatar { flex-shrink: 0; }
  .avatar-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; display: block; }
  .section { margin-bottom: 16px; }
  .section-title { font-size: 11px; font-weight: 700; color: #000; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--line); }
  .entry { margin-bottom: 10px; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .entry-title { font-size: 13.5px; font-weight: 600; color: #111; }
  .entry-meta { font-size: 12px; color: var(--text-light); flex-shrink: 0; padding-left: 8px; }
  .entry-sub { font-size: 12px; color: var(--text-light); margin-bottom: 3px; }
  .entry-sub .tag { font-size: 11px; color: var(--text-light); }
  .entry-sub .tag::before { content: '|'; margin: 0 6px; color: #ddd; }
  .entry-sub .tag:first-child::before { content: none; }
  .entry-body { margin-top: 2px; }
  .entry-body ul { list-style: none; padding-left: 0; }
  .entry-body li { position: relative; padding-left: 16px; margin-bottom: 2px; color: var(--text-light); font-size: 12px; }
  .entry-body li::before { content: '—'; position: absolute; left: 0; color: #ccc; font-size: 11px; }
  .entry-body li strong { color: var(--text); font-weight: 600; }
  .two-col { display: flex; gap: 14px; margin-bottom: 16px; }
  .two-col > div { flex: 1; }
  .edu-entry { margin-bottom: 8px; }
  .edu-entry .entry-header { margin-bottom: 4px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 3px 0; }
  .skills-wrap .item { font-size: 12px; color: var(--text-light); margin-right: 18px; }
  .skills-wrap .item strong { color: var(--text); }
  .footer-deco { margin-top: 20px; text-align: center; font-size: 8px; color: #ddd; letter-spacing: 4px; }
  @media print { body { background: #fff; padding: 0; } .page { box-shadow: none; margin: 0; padding: 0; width: auto; min-height: auto; } }
</style>
</head>
<body>
<div class="page">
{header}
{sections}
{footer}
</div>
</body>
</html>
