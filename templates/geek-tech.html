<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title}</title>
<style>
  @page { size: A4; margin: 18mm 15mm; }
  * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; }
  :root { --accent: #374151; --accent-light: #f3f4f6; --accent-mid: #d1d5db; --text: #111827; --text-light: #6b7280; }
  body { font-family: "Inter","PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif; background: #e8e8e8; font-size: 13px; line-height: 1.5; padding: 20px 0; color: var(--text); }
  .page { width: 210mm; min-height: 297mm; background: #fff; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 18mm 15mm; }
  .header { margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 26px; font-weight: 700; color: #000; margin-bottom: 4px; }
  .header .info-line { font-size: 12px; color: var(--text-light); display: flex; flex-wrap: wrap; gap: 4px 14px; }
  .header .target { font-size: 12.5px; color: var(--accent); font-weight: 500; margin-top: 2px; }
  .section { margin-bottom: 14px; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; padding: 4px 0; border-bottom: 2px solid var(--accent); display: inline-block; }
  .entry { margin-bottom: 8px; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .entry-title { font-size: 13px; font-weight: 600; }
  .entry-meta { font-size: 11.5px; color: var(--text-light); flex-shrink: 0; padding-left: 8px; }
  .entry-sub { font-size: 12px; color: var(--text-light); margin-bottom: 3px; display: flex; flex-wrap: wrap; gap: 4px 8px; }
  .entry-body { margin-top: 2px; }
  .entry-body ul { padding-left: 16px; }
  .entry-body li { margin-bottom: 2px; color: var(--text-light); font-size: 12px; }
  .entry-body li strong { color: var(--text); }
  .two-col { display: flex; gap: 14px; margin-bottom: 14px; }
  .two-col > div { flex: 1; }
  .edu-entry { margin-bottom: 8px; }
  .edu-entry .entry-header { margin-bottom: 4px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 3px 0; }
  .skills-wrap .item { font-size: 12px; color: var(--text-light); margin-right: 18px; }
  .skills-wrap .item strong { color: var(--text); }
  .footer-deco { margin-top: 20px; text-align: center; font-size: 8px; color: var(--accent-mid); letter-spacing: 4px; }
  @media print { body { background: #fff; padding: 0; } .page { box-shadow: none; margin: 0; padding: 0; width: auto; min-height: auto; } }
</style>
</head>
<body>
<div class="page">
{header}
{sections}
{footer}
</div>
</body>
</html>
