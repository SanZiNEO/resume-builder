type: entry-list
title: Experience
items:
  - heading: 资深前端工程师 / 前端技术负责人 · 某大型互联网公司
    meta: 2021.06 – 至今
    sub: 微前端 / 前端架构 / 团队管理
    body:
      - "负责公司核心业务线的前端架构设计与技术演进，前端团队 12 人，直接汇报 4 名小组长"
      - "主导微前端架构（qiankun + Module Federation）落地，将 8 个独立子应用整合为统一平台，支撑日活 500 万+ 用户，应用间切换耗时从 3s 降至 0.3s"
      - "自研前端 CLI 工具（@company/cli），集成项目脚手架、构建配置、代码规范检查、自动化发布，推广至公司 20+ 项目使用，新项目初始化时间从天级降至分钟级"
      - "搭建前端性能监控平台（Web Vitals + 自建埋点），覆盖 90%+ 核心页面，推动性能优化专项，LCP 从 3.2s 优化至 1.8s，CLS 从 0.25 降至 0.08"
      - "建立前端技术评审机制和质量门禁（Code Review + CI 流水线 + 自动化测试覆盖率卡点），线上故障率同比下降 60%"
      - "组织 weekly 技术分享和新人 onboarding 体系，培养出 3 名高级工程师和 1 名技术组长"

  - heading: 高级前端开发工程师 · 某互联网科技公司
    meta: 2019.03 – 2021.05
    sub: React / 前端基建 / 性能优化
    body:
      - "作为核心开发参与公司主产品的中后台管理系统重构，采用 React 16 + TypeScript + Ant Design 技术栈，覆盖 50+ 业务模块"
      - "设计并实现通用中后台低代码方案（JSON Schema 驱动表单/表格/图表），业务开发效率提升 100%，累计沉淀 200+ 可复用组件"
      - "构建前端单元测试体系（Jest + React Testing Library），核心模块覆盖率达 85%，CI 流水线集成自动化测试"
      - "优化前端构建流程：Webpack 4 → 5 升级、持久化缓存、CDN 发布，CI 构建时间从 12min 降至 3min"
      - "制定前端编码规范和 Git 分支管理流程，引入 ESLint + Prettier + Husky 自动化规范检查"

  - heading: 前端开发工程师 · 上海某创业公司
    meta: 2016.06 – 2019.02
    sub: Vue.js / 全栈开发 / 从0到1
    body:
      - "作为前端第 1 号员工加入，从零搭建前端团队和技术体系，独立完成 MVP 版本开发并在 3 个月内上线"
      - "技术栈选型 Vue 2 + Element UI + Webpack 3，支撑产品快速迭代，2 年内累计交付 30+ 大版本"
      - "采用 Node.js + Express 搭建 BFF 中间层，聚合后端微服务接口，前端开发联调效率提升 50%"
      - "开发可视化活动配置平台（拖拽生成 H5 营销页面），非技术运营人员自助创建活动 100+ 场"
