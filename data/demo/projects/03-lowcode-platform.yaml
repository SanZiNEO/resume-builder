  - "前端采用 React + Formily + Ant Design 技术栈，实现可视化拖拽编辑器 + 配置解析引擎双架构"
  - "后端 Node.js + MongoDB 存储配置模板和页面元数据，支持多环境（dev/staging/prod）发布"
  - "接入公司权限系统和数据源 SDK，支持复杂权限控制和真实数据绑定"
  - "累计沉淀 200+ 可复用组件模板，公司内部 15 个业务线使用，减少重复开发工时约 3000 人/天"
