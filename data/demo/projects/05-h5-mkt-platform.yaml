type: entry-list
title: Projects
heading: 可视化 H5 营销活动配置平台
meta: 2017.09 – 2018.12
sub: 前端负责人 / 独立开发
body:
  - "面向运营人员的拖拽式 H5 营销页面生成平台，支持组件拖拽、样式配置、数据绑定、A/B 测试"
  - "基于 Vue 2 + Vuex + Element UI，自研 H5 渲染引擎，支持 30+ 种组件类型（图文、表单、投票、抽奖、地图等）"
  - "搭建组件市场机制，运营人员可自定义组件模板并分享给团队复用"
  - "平台上线后累计创建 H5 活动 100+ 场，单场最高 UV 50 万，运营自助建页时间从 3 天缩至 2 小时"
